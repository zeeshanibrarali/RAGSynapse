services:
  ragsynapse:
    build:
      context: .
      dockerfile: Dockerfile
    image: ragsynapse:v3
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/ragsynapse/src
      - OLLAMA_BASE_URL=http://ollama:11434
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    env_file:
      - .env
    networks:
      - ragsynapse-network
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - "./:/ragsynapse"

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ragsynapse-network
    volumes:
      - "./store/vecdb:/data"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_NUM_THREADS=4
      - OLLAMA_KEEP_ALIVE=30m
    networks:
      - ragsynapse-network
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    networks:
      - ragsynapse-network
    volumes:
      - mlflow_data:/mlflow

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: ragsynapse-api:v1
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/ragsynapse/src
      - OLLAMA_BASE_URL=http://ollama:11434
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    env_file:
      - .env
    networks:
      - ragsynapse-network
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - "./:/ragsynapse"
    command: >
      uvicorn api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /ragsynapse/src/api

networks:
  ragsynapse-network:
    driver: bridge

volumes:
  ollama_models:
  mlflow_data: